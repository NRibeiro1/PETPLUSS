{% extends 'base.html' %}
{% block content %}

<link rel="stylesheet" href="/static/css/editar_pet.css">

<div class="form-container">
    <h2>Editar Pet</h2>

    <form class="styled-form" action="{{ url_for('editar_pet', id=pet['id']) }}" method="POST">

        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" value="{{ pet['nome'] }}" required>

        <label for="especie">Espécie:</label>
        <input type="text" id="especie" name="especie" value="{{ pet['especie'] }}" required>

        <label for="idade">Idade (anos):</label>
        <input type="number" id="idade" name="idade" value="{{ pet['idade'] }}" required>

        <label for="idade_meses">Idade em meses:</label>
        <input type="number" id="idade_meses" name="idade_meses" min="0" value="{{ pet['idade_meses'] or '' }}">

        <label for="peso">Peso (kg):</label>
        <input type="number" id="peso" name="peso" min="0" step="0.1" value="{{ pet['peso'] or '' }}">

        <label for="porte">Porte:</label>
        <select id="porte" name="porte">
            <option value="">Selecione</option>
            <option value="Pequeno" {% if pet['porte'] == 'Pequeno' %}selected{% endif %}>Pequeno</option>
            <option value="Médio" {% if pet['porte'] == 'Médio' %}selected{% endif %}>Médio</option>
            <option value="Grande" {% if pet['porte'] == 'Grande' %}selected{% endif %}>Grande</option>
        </select>

        <label for="dono_id">Dono:</label>
        <select id="dono_id" name="dono_id" required>
            {% for d in donos %}
                <option value="{{ d.id }}" 
                    {% if d.id == pet['dono_id'] %}selected{% endif %}>
                    {{ d.nome }}
                </option>
            {% endfor %}
        </select>

        <label for="user_id">Usuário do cliente:</label>
        <select id="user_id" name="user_id" required>
            {% for user in users %}
                <option value="{{ user.id }}"
                    {% if user.id == pet['user_id'] %}selected{% endif %}>
                    {{ user.username }} - {{ user.nome }}
                </option>
            {% endfor %}
        </select>

        <div class="vaccines-editor">
            <div class="vaccines-editor-top">
                <div>
                    <label class="vaccines-title">Vacinas</label>
                    <p class="vaccines-help">Adicione quantas vacinas quiser e ajuste as datas do pet.</p>
                </div>
                <button type="button" class="add-vaccine-btn" data-add-vaccine aria-label="Adicionar outra vacina">+</button>
            </div>

            <div class="vaccine-list" id="vaccine-list">
                {% for vaccine in vaccines %}
                    <div class="vaccine-item">
                        {% if vaccines|length > 1 %}
                            <button type="button" class="remove-vaccine-btn" data-remove-vaccine aria-label="Remover vacina">×</button>
                        {% endif %}
                        <div class="vaccine-grid">
                            <div class="form-group-inline">
                                <label>Vacina</label>
                                <textarea name="vacina_nome[]" rows="2" placeholder="Ex.: V10">{{ vaccine['vacina_nome'] or '' }}</textarea>
                            </div>

                            <div class="form-group-inline">
                                <label>Data da vacina</label>
                                <input type="date" name="vacina_data[]" value="{{ vaccine['vacina_data'] or '' }}">
                            </div>

                            <label class="checkbox-row">
                                <input type="hidden" name="vacina_recorrente_anual[]" value="{{ 1 if vaccine['recorrente_anual'] else 0 }}">
                                <input type="checkbox" data-recurring-toggle {% if vaccine['recorrente_anual'] %}checked{% endif %}>
                                <span>Recorre a cada 1 ano</span>
                            </label>
                        </div>
                    </div>
                {% else %}
                    <div class="vaccine-item">
                        <div class="vaccine-grid">
                            <div class="form-group-inline">
                                <label>Vacina</label>
                                <textarea name="vacina_nome[]" rows="2" placeholder="Ex.: V10"></textarea>
                            </div>

                            <div class="form-group-inline">
                                <label>Data da vacina</label>
                                <input type="date" name="vacina_data[]">
                            </div>

                            <label class="checkbox-row">
                                <input type="hidden" name="vacina_recorrente_anual[]" value="0">
                                <input type="checkbox" data-recurring-toggle>
                                <span>Recorre a cada 1 ano</span>
                            </label>
                        </div>
                    </div>
                {% endfor %}
            </div>
        </div>

        <button class="save-btn" type="submit">Salvar alterações</button>
    </form>

    <a class="back-link" href="{{ url_for('listar_pets') }}">Voltar</a>
</div>

<template id="vaccine-item-template">
    <div class="vaccine-item">
        <button type="button" class="remove-vaccine-btn" data-remove-vaccine aria-label="Remover vacina">×</button>
        <div class="vaccine-grid">
            <div class="form-group-inline">
                <label>Vacina</label>
                <textarea name="vacina_nome[]" rows="2" placeholder="Ex.: Antirrábica"></textarea>
            </div>

            <div class="form-group-inline">
                <label>Data da vacina</label>
                <input type="date" name="vacina_data[]">
            </div>

            <label class="checkbox-row">
                <input type="hidden" name="vacina_recorrente_anual[]" value="0">
                <input type="checkbox" data-recurring-toggle>
                <span>Recorre a cada 1 ano</span>
            </label>
        </div>
    </div>
</template>

<script>
    const vaccineList = document.getElementById("vaccine-list");
    const vaccineTemplate = document.getElementById("vaccine-item-template");
    const addVaccineButton = document.querySelector("[data-add-vaccine]");

    function wireVaccineItem(vaccineItem) {
        const toggle = vaccineItem.querySelector("[data-recurring-toggle]");
        const hiddenInput = vaccineItem.querySelector('input[type="hidden"][name="vacina_recorrente_anual[]"]');
        const removeButton = vaccineItem.querySelector("[data-remove-vaccine]");

        if (toggle && hiddenInput) {
            toggle.addEventListener("change", () => {
                hiddenInput.value = toggle.checked ? "1" : "0";
            });
        }

        if (removeButton) {
            removeButton.addEventListener("click", () => {
                if (vaccineList.children.length > 1) {
                    vaccineItem.remove();
                }
            });
        }
    }

    addVaccineButton.addEventListener("click", () => {
        const fragment = vaccineTemplate.content.cloneNode(true);
        const vaccineItem = fragment.querySelector(".vaccine-item");
        wireVaccineItem(vaccineItem);
        vaccineList.appendChild(fragment);
    });

    document.querySelectorAll(".vaccine-item").forEach(wireVaccineItem);
</script>

{% endblock %}
